{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: calc(100vh - 2rem);">
    <div class="glass-card p-4 p-md-5 fade-in-up" style="width: min(520px, 100%);">
        <div class="mb-4 text-center">
            <div class="fw-bold text-primary" style="letter-spacing: 0.08em; text-transform: uppercase; font-size: 0.8rem;">LogAnalyzer</div>
            <h3 class="fw-bold mb-1">Sign in</h3>
            <div class="text-muted">Access your dashboards securely.</div>
        </div>

        <form method="POST" novalidate class="needs-validation" id="loginForm">
            <div class="mb-3">
                <label class="form-label fw-bold small">Username or Email</label>
                <input name="identifier" id="identifier" class="form-control input-saas" required>
                <div class="invalid-feedback">Please enter your username or email.</div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold small">Password</label>
                <input type="password" name="password" id="password" class="form-control input-saas" required minlength="6">
                <div class="invalid-feedback">Please enter your password.</div>
            </div>

            <button class="btn btn-saas w-100 py-2" type="submit">
                <i class="fas fa-right-to-bracket me-2"></i>Login
            </button>
        </form>

        <div class="text-center mt-3 small text-muted">
            Admins can create users from the sidebar menu.
        </div>
    </div>
</div>

<script>
    (() => {
        const form = document.getElementById('loginForm');
        form.addEventListener('submit', (e) => {
            if (!form.checkValidity()) {
                e.preventDefault();
                e.stopPropagation();
            }
            form.classList.add('was-validated');
        });
    })();
</script>
{% endblock %}
