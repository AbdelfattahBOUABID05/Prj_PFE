<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}LogAnalyzer AI{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="sidebar">
        <h4 class="fw-bold text-primary mb-5"><i class="fas fa-brain"></i> LogAnalyzer</h4>
        <nav>
            <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">
                <i class="fas fa-chart-pie me-2"></i> Dashboard
                
            </a> <a href="/ssh" class="nav-link {% if request.path == '/ssh' %}active{% endif %}">
                <i class="fas fa-server me-2"></i> Consulter avec SSH
            </a>

            <a href="/report" class="nav-link {% if request.path == '/report' %}active{% endif %}">
                <i class="fas fa-file-invoice me-2"></i> Rapport d'Analyse
            </a>
            
            <a href="/details" class="nav-link {% if request.path == '/details' %}active{% endif %}">
                <i class="fas fa-list-ul me-2"></i> Lignes de Logs
            </a>
        </nav>
    </div>
    <div class="main-content">
        {% block content %}{% endblock %}
        <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> {% block extra_js %}{% endblock %}
</body>
</html>
