<div class="flex h-screen bg-[#f0f2f5] dark:bg-[#0a192f] transition-colors duration-500">
  <app-sidebar></app-sidebar>

  <main class="flex-1 ml-64 flex flex-col">
    <header class="bg-white/80 dark:bg-[#001f3f]/80 backdrop-blur-xl border-b border-slate-200 dark:border-white/10 px-8 py-4 flex justify-between items-center sticky top-0 z-10">
      <div>
        <h2 class="text-2xl font-black text-slate-900 dark:text-white tracking-tight uppercase italic flex items-center gap-3">
          <i class="fas fa-terminal text-indigo-500 not-italic"></i>
          Console <span class="text-indigo-500">Remote</span> SOC
        </h2>
        <p class="text-slate-500 dark:text-white/40 text-[10px] font-black uppercase tracking-[0.2em] mt-1">Administration Système & Accès Direct Sécurisé</p>
      </div>
      <div class="flex items-center gap-3">
        <div class="px-4 py-2 bg-red-500/10 border border-red-500/20 rounded-xl">
          <span class="text-[9px] font-black text-red-500 uppercase tracking-widest">Zone Critique : Admin Only</span>
        </div>
      </div>
    </header>

    <div class="flex-1 p-8 grid grid-cols-12 gap-8 overflow-y-auto">
      <!-- Connection Panel -->
      <div class="col-span-3 space-y-6 flex flex-col overflow-y-auto pr-2">
        <div class="glass-card p-8 relative group border-l-4 border-indigo-600">
          <div class="absolute top-0 right-0 w-32 h-32 bg-indigo-500/5 rounded-full blur-2xl -mr-16 -mt-16 transition-all duration-700 group-hover:bg-indigo-500/10"></div>
          
          <h3 class="font-black text-slate-900 dark:text-white/60 text-[10px] uppercase tracking-[0.3em] mb-8">Authentification SSH</h3>
          
          <div class="space-y-6 relative z-10">
            <div class="space-y-2">
              <label class="block text-[9px] font-black text-slate-500 dark:text-white/20 uppercase tracking-widest ml-1">Hôte (IP)</label>
              <input type="text" [(ngModel)]="ssh.host" 
                     class="w-full bg-slate-100/50 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-xl px-4 py-3 text-xs font-bold focus:ring-2 focus:ring-indigo-500/50 outline-none transition-all text-indigo-900 dark:text-white font-bold placeholder-slate-400 dark:placeholder-white/10">
            </div>

            <div class="space-y-2">
              <label class="block text-[9px] font-black text-slate-500 dark:text-white/20 uppercase tracking-widest ml-1">Utilisateur</label>
              <input type="text" [(ngModel)]="ssh.user" 
                     class="w-full bg-slate-100/50 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-xl px-4 py-3 text-xs font-bold focus:ring-2 focus:ring-indigo-500/50 outline-none transition-all text-indigo-900 dark:text-white font-bold placeholder-slate-400 dark:placeholder-white/10">
            </div>

            <div class="space-y-2">
              <label class="block text-[9px] font-black text-slate-500 dark:text-white/20 uppercase tracking-widest ml-1">Mot de passe</label>
              <input type="password" [(ngModel)]="ssh.pass" 
                     class="w-full bg-slate-100/50 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-xl px-4 py-3 text-xs font-bold focus:ring-2 focus:ring-indigo-500/50 outline-none transition-all text-indigo-900 dark:text-white font-bold placeholder-slate-400 dark:placeholder-white/10">
            </div>
          </div>

          <div class="pt-8 relative z-10">
            <button (click)="clearConsole()" 
                    class="w-full px-4 py-4 bg-slate-100 dark:bg-white/5 hover:bg-red-500 hover:text-white border border-slate-200 dark:border-white/10 rounded-xl transition-all duration-300 text-[10px] font-black uppercase tracking-widest text-slate-500 dark:text-white/40">
              Effacer Console
            </button>
          </div>
        </div>

        <!-- Quick Connect List -->
        <div *ngIf="recentConnections.length > 0" class="glass-card p-8 flex-1">
          <div class="flex items-center justify-between mb-6">
            <h3 class="font-black text-slate-900 dark:text-white/60 text-[10px] uppercase tracking-[0.3em]">Historique</h3>
            <i class="fas fa-history text-indigo-500 text-xs"></i>
          </div>
          <div class="space-y-3">
            <button *ngFor="let conn of recentConnections" 
                    (click)="fillForm(conn)"
                    class="w-full text-left p-4 rounded-xl bg-slate-50 dark:bg-white/5 border border-transparent hover:border-indigo-500/30 hover:bg-white dark:hover:bg-white/10 transition-all group relative overflow-hidden">
              <div class="absolute left-0 top-0 w-1 h-0 bg-indigo-500 group-hover:h-full transition-all"></div>
              <div class="text-[11px] font-black text-slate-900 dark:text-white group-hover:text-indigo-500 transition-colors truncate">{{ conn.host }}</div>
              <div class="text-[9px] text-slate-400 dark:text-white/20 font-black uppercase tracking-widest mt-1 truncate">{{ conn.username }}</div>
            </button>
          </div>
        </div>
      </div>

      <!-- Terminal Section -->
      <div class="col-span-9 flex flex-col glass-card bg-[#0a0c10] border-slate-800 shadow-[0_30px_60px_rgba(0,0,0,0.5)] overflow-hidden relative group">
        <div class="absolute inset-0 bg-indigo-500/[0.02] pointer-events-none"></div>
        
        <!-- Terminal Header -->
        <div class="px-6 py-4 bg-black/40 border-b border-white/5 flex items-center justify-between">
          <div class="flex items-center gap-2">
            <div class="flex gap-1.5 mr-4">
              <div class="w-3 h-3 rounded-full bg-red-500/50"></div>
              <div class="w-3 h-3 rounded-full bg-amber-500/50"></div>
              <div class="w-3 h-3 rounded-full bg-emerald-500/50"></div>
            </div>
            <span class="text-[10px] font-black text-white/30 uppercase tracking-[0.3em]">SOC Terminal - Interactive Shell</span>
          </div>
          <div class="flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
            <span class="text-[9px] font-black text-emerald-500/60 uppercase tracking-widest italic">Live Session</span>
          </div>
        </div>

        <!-- Terminal Output -->
        <div class="flex-1 p-8 font-mono text-sm overflow-auto no-scrollbar bg-black/60 relative" #terminalBody>
          <div *ngFor="let line of history" class="mb-6 animate-fade-in">
            <div class="flex items-center gap-3 mb-2">
              <span class="text-indigo-500 font-black text-xs">$</span>
              <span class="text-indigo-400 font-bold text-xs tracking-tight">{{ line.cmd }}</span>
            </div>
            <pre class="pl-6 whitespace-pre-wrap text-emerald-500/80 leading-relaxed text-xs">{{ line.output }}</pre>
            <pre *ngIf="line.error" class="pl-6 mt-2 whitespace-pre-wrap text-red-500/80 font-bold text-xs bg-red-500/5 p-4 rounded-xl border border-red-500/10">{{ line.error }}</pre>
          </div>
          <div *ngIf="loading" class="flex items-center gap-3 text-indigo-400 font-bold text-xs animate-pulse pl-6">
            <i class="fas fa-spinner fa-spin"></i>
            <span class="uppercase tracking-widest">Exécution de la commande SOC...</span>
          </div>
          <div *ngIf="history.length === 0" class="h-full flex flex-col items-center justify-center gap-6 opacity-20 group-hover:opacity-40 transition-opacity duration-700">
            <i class="fas fa-terminal text-8xl text-white"></i>
            <p class="text-[10px] font-black text-white uppercase tracking-[0.4em]">Prêt pour la commande</p>
          </div>
        </div>

        <!-- Terminal Input -->
        <div class="p-6 bg-black border-t border-white/5 flex items-center gap-4">
          <div class="w-8 h-8 rounded-lg bg-indigo-500/10 flex items-center justify-center shrink-0">
            <span class="text-indigo-500 font-black font-mono text-sm">$</span>
          </div>
          <input type="text" [(ngModel)]="command" (keyup.enter)="executeCommand()" [disabled]="loading"
                 placeholder="Entrez votre commande Linux (ex: ls -la, whoami, top)..."
                 class="flex-1 bg-transparent border-none outline-none font-mono text-[#00f2ff] text-sm placeholder-white/10">
          <button (click)="executeCommand()" [disabled]="loading"
                  class="px-8 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl transition-all duration-300 text-[10px] font-black uppercase tracking-widest shadow-lg shadow-indigo-600/20 disabled:opacity-20">
            Exécuter
          </button>
        </div>
      </div>
    </div>
  </main>
</div>
